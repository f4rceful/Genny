<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathBox — Умный калькулятор</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <main class="calculator-card">
            <header class="calc-header">
                <h1>MathBox</h1>
                <button id="copy-btn" class="icon-btn" title="Копировать результат" disabled>
                    📋
                </button>
            </header>
            
            <div class="display-container">
                <div id="display-prev" class="display-secondary"></div>
                <div id="display-main" class="display-primary">0</div>
            </div>

            <div class="keypad" id="keypad">
                <button class="btn btn-danger" data-action="clear">C</button>
                <button class="btn btn-func" data-action="backspace">⌫</button>
                <button class="btn btn-op" data-op="÷">÷</button>
                <button class="btn btn-op" data-op="×">×</button>

                <button class="btn" data-digit="7">7</button>
                <button class="btn" data-digit="8">8</button>
                <button class="btn" data-digit="9">9</button>
                <button class="btn btn-op" data-op="-">-</button>

                <button class="btn" data-digit="4">4</button>
                <button class="btn" data-digit="5">5</button>
                <button class="btn" data-digit="6">6</button>
                <button class="btn btn-op" data-op="+">+</button>

                <button class="btn" data-digit="1">1</button>
                <button class="btn" data-digit="2">2</button>
                <button class="btn" data-digit="3">3</button>
                <button class="btn btn-equal" data-action="compute">=</button>

                <button class="btn btn-zero" data-digit="0">0</button>
                <button class="btn" data-digit=".">.</button>
            </div>
        </main>

        <aside class="history-panel">
            <div class="history-header">
                <h2>История</h2>
            </div>
            <ul id="history-list" class="history-list">
                <li class="history-empty">История операций пуста</li>
            </ul>
        </aside>
    </div>

    <script src="js/calculator.js"></script>
    <script src="js/history.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
