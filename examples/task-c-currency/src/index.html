<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CurrencyFlow — Конвертер валют</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dark-theme">
    <div class="container">
        <header>
            <h1>CurrencyFlow</h1>
            <div id="status-bar" class="status-bar">Загрузка курсов...</div>
        </header>

        <main class="converter-card">
            <div class="input-group">
                <label for="amount-input">Сумма</label>
                <input type="number" id="amount-input" placeholder="Введите сумму" step="any" min="0">
                <div id="error-message" class="error-message hidden"></div>
            </div>

            <div class="row">
                <div class="select-wrapper">
                    <label for="from-currency">Из</label>
                    <select id="from-currency" data-select="from"></select>
                </div>

                <div class="swap-container">
                    <button id="swap-btn" class="swap-btn" title="Поменять валюты местами">⇄</button>
                </div>

                <div class="select-wrapper">
                    <label for="to-currency">В</label>
                    <select id="to-currency" data-select="to"></select>
                </div>
            </div>

            <div id="result-container" class="result-container hidden">
                <div class="result-text">
                    <span id="result-value"></span>
                </div>
                <div id="rate-info" class="rate-info"></div>
            </div>
        </main>

        <section class="history-section">
            <h2>История операций</h2>
            <ul id="history-list" class="history-list">
                <!-- История будет добавлена через JS -->
            </ul>
        </section>
    </div>

    <script src="js/api.js"></script>
    <script src="js/cache.js"></script>
    <script src="js/converter.js"></script>
    <script src="js/history.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
